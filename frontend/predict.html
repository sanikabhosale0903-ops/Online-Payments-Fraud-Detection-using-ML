<!DOCTYPE html>
<html>
<head>
<title>Predict</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #1f4037, #99f2c8);
    text-align: center;
}

.form-box {
    background: white;
    width: 400px;
    margin: 80px auto;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

input, select {
    width: 90%;
    padding: 10px;
    margin: 10px;
}

button {
    padding: 10px 20px;
    background: #1f4037;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #14532d;
}
</style>

</head>

<body>

<div class="form-box">

<h2>Enter Transaction Details</h2>

<form action="/submit" method="POST">

<input name="step" placeholder="Step"><br>

<select name="type">
    <option value="0">PAYMENT</option>
    <option value="1">TRANSFER</option>
    <option value="2">CASH_OUT</option>
    <option value="3">DEBIT</option>
    <option value="4">CASH_IN</option>
</select><br>

<input name="amount" placeholder="Amount"><br>
<input name="oldbalanceOrg" placeholder="Old Balance Org"><br>
<input name="newbalanceOrig" placeholder="New Balance Orig"><br>
<input name="oldbalanceDest" placeholder="Old Balance Dest"><br>
<input name="newbalanceDest" placeholder="New Balance Dest"><br>

<button type="submit">Predict</button>

</form>

</div>

</body>
</html>
